| คาบที่ 6 14:30–15:30 | สังคมศึกษา 5 นางสาวจินดารัตน์ ไชยชนะ | ประวัติศาสตร์ 5 นางสาวจินดารัตน์ ไชยชนะ | แนะแนว 5 นางสาวจินดารัตน์ ไชยชนะ | สังคมศึกษา 5 นางสาวจินดารัตน์ ไชยชนะ | ภาษาไทยเพิ่มเติม 5 นางสาววาสิณี หมื่นจิตร |
| คาบที่ 7 15:30–16:00 | | | | ลูกเสือสามัญรุ่นใหญ่ 5 นางสายยนต์ บุญเหลือ | |
        `;

        // 4. Logic Functions
        function getTeacherStyle(cellText) {
            for (let t of teachers) {
                if (cellText.includes(t.name)) return t.colorClass;
            }
            return "bg-slate-50 border-slate-200 text-slate-500"; 
        }

        function addEmoji(subjectName) {
            for (let e of emojis) {
                if (e.keywords.some(k => subjectName.includes(k))) {
                    return `<span class="text-xl mr-1">${e.emoji}</span> ` + subjectName;
                }
            }
            return `<span class="text-xl mr-1">📚</span> ` + subjectName;
        }

        function parseCell(rawText) {
            const text = rawText.trim();
            if (!text) return { isEmpty: true };
            
            const match = text.match(/^(.*?)\s+((?:นาง|นาย|นางสาว).*)$/);
            if (match) {
                return {
                    isEmpty: false,
                    subject: match[1].trim(),
                    teacher: match[2].trim()
                };
            }
            return {
                isEmpty: false,
                subject: text,
                teacher: ""
            };
        }

        function processData() {
            const classesRaw = rawMarkdown.split('ตารางเรียน').filter(b => b.trim().length > 0);
            const scheduleData = [];

            classesRaw.forEach(block => {
                const lines = block.trim().split('\n');
                const gradeLine = lines.find(l => l.includes('ชั้น'));
                if(!gradeLine) return;
                
                const grade = gradeLine.replace('ชั้น', '').trim();
                const tableLines = lines.filter(l => l.trim().startsWith('| คาบที่'));
                
                const rows = tableLines.map(line => {
                    let parts = line.split('|');
                    parts.shift();
                    parts.pop();
                    parts = parts.map(s => s.trim());
                    return parts;
                });

                scheduleData.push({ grade, rows });
            });
            return scheduleData;
        }

        // 5. UI Rendering
        const data = processData();

        function renderLegend() {
            const container = document.getElementById('legend-container');
            teachers.forEach(t => {
                const tag = document.createElement('div');
                tag.className = `flex items-center px-3 py-1.5 rounded-full border text-sm font-medium ${t.colorClass}`;
                tag.innerHTML = `<span>${t.icon}</span> <span class="ml-2">${t.name}</span>`;
                container.appendChild(tag);
            });
        }

        function renderTabs() {
            const container = document.getElementById('tabs-container');
            data.forEach((cls, index) => {
                const btn = document.createElement('button');
                btn.className = `tab-btn px-5 py-2 rounded-full font-semibold text-slate-600 bg-white border border-slate-200 hover:bg-slate-50 transition-colors shadow-sm flex items-center gap-2 ${index === 0 ? 'active' : ''}`;
                
                const imgSrc = classImages[cls.grade] || `https://placehold.co/100x100/e2e8f0/64748b?text=${cls.grade}`;
                
                btn.innerHTML = `
                    <img src="${imgSrc}" alt="${cls.grade}" class="w-8 h-8 rounded-full border border-slate-200 bg-white object-cover">
                    <span class="tab-label">ชั้น ${cls.grade}</span>
                `;
                
                btn.onclick = () => switchTab(index, btn);
                container.appendChild(btn);
            });
        }

        function renderTables() {
            const container = document.getElementById('schedule-container');
            const days = ['จันทร์', 'อังคาร', 'พุธ', 'พฤหัสบดี', 'ศุกร์'];

            data.forEach((cls, index) => {
                const tableWrapper = document.createElement('div');
                tableWrapper.id = `table-${index}`;
                tableWrapper.className = `w-full overflow-x-auto hide-scroll ${index === 0 ? 'block' : 'hidden'}`;
                
                const imgSrc = classImages[cls.grade] || `https://placehold.co/100x100/e2e8f0/64748b?text=${cls.grade}`;
                
                let html = `
                    <div class="min-w-[1000px] p-8 bg-white" id="capture-area-${index}">
                        <div class="flex items-center justify-between mb-6">
                            <div class="flex items-center gap-3 border-l-4 border-blue-500 pl-4">
                                <img src="${imgSrc}" alt="${cls.grade}" class="w-10 h-10 rounded-full shadow-sm border border-slate-200 bg-white object-cover">
                                <h3 class="text-2xl font-bold text-slate-800">ตารางเรียนชั้น ${cls.grade}</h3>
                            </div>
                            <div class="text-slate-500 font-medium">โรงเรียนวัดเสนาสน์ ภาคเรียนที่ 1/2569</div>
                        </div>
                        <div class="grid grid-cols-6 gap-3">
                            <!-- Headers -->
                            <div class="bg-slate-800 text-white p-3 rounded-xl text-center font-semibold shadow-md flex items-center justify-center">🕒 คาบ / วัน</div>
                `;
                
                days.forEach(day => {
                    html += `<div class="bg-slate-700 text-white p-3 rounded-xl text-center font-semibold shadow-md">${day}</div>`;
                });

                // Rows
                cls.rows.forEach(row => {
                    const timeParts = row[0].split(' ');
                    const period = timeParts[0] + ' ' + timeParts[1]; 
                    const timeSpan = timeParts[2] || '';

                    html += `
                        <div class="bg-slate-100 p-3 rounded-xl flex flex-col items-center justify-center border border-slate-200 shadow-sm text-center">
                            <span class="font-bold text-slate-700">${period}</span>
                            <span class="text-sm text-slate-500">${timeSpan}</span>
                        </div>
                    `;

                    // Cells for Mon-Fri
                    for (let i = 1; i <= 5; i++) {
                        const cellData = parseCell(row[i] || "");
                        
                        if (cellData.isEmpty) {
                            html += `<div class="bg-slate-50 border border-slate-200 rounded-xl p-3 flex items-center justify-center text-slate-400 text-sm italic">ว่าง</div>`;
                        } else {
                            const styleClass = getTeacherStyle(cellData.teacher);
                            const subjectWithEmoji = addEmoji(cellData.subject);
                            
                            html += `
                                <div class="schedule-cell rounded-xl p-3 border shadow-sm flex flex-col justify-center items-center text-center ${styleClass}">
                                    <div class="font-bold text-sm md:text-base leading-tight mb-1">${subjectWithEmoji}</div>
                                    ${cellData.teacher ? `<div class="text-xs opacity-80 mt-1 flex items-center gap-1"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>${cellData.teacher}</div>` : ''}
                                </div>
                            `;
                        }
                    }
                });

                html += `</div></div>`;
                tableWrapper.innerHTML = html;
                container.appendChild(tableWrapper);
            });
        }

        function switchTab(index, btnElement) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');

            data.forEach((_, i) => {
                document.getElementById(`table-${i}`).classList.add('hidden');
                document.getElementById(`table-${i}`).classList.remove('block');
            });
            document.getElementById(`table-${index}`).classList.remove('hidden');
            document.getElementById(`table-${index}`).classList.add('block');
        }

        // 6. Download as Image Logic
        function downloadAsImage() {
            // หา Tab ที่กำลัง Active อยู่เพื่อดึงชื่อชั้น
            const activeTab = document.querySelector('.tab-btn.active .tab-label');
            const gradeName = activeTab ? activeTab.innerText.trim().replace(/\s+/g, '_') : 'ตารางเรียน';
            const fileName = `ตารางเรียน_${gradeName}.png`;

            // หา Container ของตารางที่แสดงผลอยู่
            const activeTableWrapper = document.querySelector('#schedule-container > div.block');
            if (!activeTableWrapper) return alert("ไม่พบตารางเรียนที่กำลังเปิดอยู่");
            
            // หา Element พื้นที่ตารางด้านใน (เพื่อให้ภาพออกมาพื้นหลังขาวพอดี ขอบเขตไม่กว้างเกินไป)
            const captureArea = activeTableWrapper.firstElementChild;

            // แจ้งผู้ใช้ว่ากำลังประมวลผล (ถ้าเครื่องช้า)
            const originalCursor = document.body.style.cursor;
            document.body.style.cursor = 'wait';

            // ใช้ html2canvas เพื่อแปลง DOM เป็น Canvas
            html2canvas(captureArea, {
                scale: 2, // เพิ่มความละเอียดภาพ (2x)
                useCORS: true, // อนุญาตให้ดึงรูปจากภายนอก (เช่น Dicebear)
                backgroundColor: '#ffffff' // กำหนดพื้นหลังเป็นสีขาว
            }).then(canvas => {
                // คืนค่า cursor
                document.body.style.cursor = originalCursor;

                // สร้าง Link สำหรับดาวน์โหลด
                const link = document.createElement('a');
                link.download = fileName;
                link.href = canvas.toDataURL('image/png');
                link.click(); // จำลองการคลิกเพื่อดาวน์โหลด
            }).catch(err => {
                document.body.style.cursor = originalCursor;
                console.error("Error capturing image:", err);
                alert("เกิดข้อผิดพลาดในการบันทึกรูปภาพ");
            });
        }

        // Initialize
        renderLegend();
        renderTabs();
        renderTables();
    </script>
</body>
</html>
